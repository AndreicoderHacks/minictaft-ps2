- name: Build game
        run: |
          echo "=== /usr/local/ps2dev ==="
          ls /usr/local/ps2dev/ || echo "EMPTY"
          echo "=== /usr/local/ ==="
          ls /usr/local/ | grep ps2
          echo "=== find gcc ==="
          find /usr/local -name "*ps2-elf-gcc*" 2>/dev/null || echo "NOT FOUND"
          make
