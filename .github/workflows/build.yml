name: Build Minicraft PS2
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PS2DEV: /usr/local/ps2dev
      PS2SDK: /usr/local/ps2dev/ps2sdk
      GSKIT: /usr/local/ps2dev/gsKit
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgmp-dev libmpfr-dev libmpc-dev texinfo bison flex
      - name: Install ps2dev
        run: |
          sudo mkdir -p /usr/local/ps2dev
          sudo chmod -R 777 /usr/local/ps2dev
          export PATH=$PATH:/usr/local/ps2dev/bin:/usr/local/ps2dev/ee/bin:/usr/local/ps2dev/iop/bin:/usr/local/ps2dev/dvp/bin:/usr/local/ps2dev/ps2sdk/bin
          git clone --depth=1 https://github.com/ps2dev/ps2dev.git
          cd ps2dev
          ./build-all.sh
      - name: Build game
        run: |
          export PATH=$PATH:/usr/local/ps2dev/bin:/usr/local/ps2dev/ee/bin:/usr/local/ps2dev/iop/bin:/usr/local/ps2dev/dvp/bin:/usr/local/ps2dev/ps2sdk/bin
          make
      - uses: actions/upload-artifact@v4
        with:
          name: minicraft-elf
          path: minicraft.elf
